<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            color: #38bdf8;
        }
        input {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 1rem;
            border: 1px solid #334155;
            border-radius: 6px;
            background-color: #0f172a;
            color: white;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #0284c7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0369a1;
        }
        #result {
            margin-top: 1rem;
            padding: 10px;
            background-color: #064e3b;
            border-radius: 6px;
            display: none;
            word-break: break-all;
        }
        #result a {
            color: #34d399;
            text-decoration: none;
        }
        #result a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>
        <form id="shortenForm">
            <input type="url" id="longUrl" placeholder="Enter a long URL (e.g. https://google.com)" required>
            <button type="submit">Shorten URL</button>
        </form>
        <div id="result">
            <p>Success! Your short URL is:</p>
            <a id="shortUrlLink" href="" target="_blank"></a>
        </div>
    </div>

    <script>
        document.getElementById('shortenForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const longUrl = document.getElementById('longUrl').value;
            const button = e.target.querySelector('button');
            
            button.disabled = true;
            button.innerText = 'Shortening...';

            try {
                const response = await fetch('/api/v1/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ longUrl })
                });

                if (response.ok) {
                    const data = await response.json();
                    const shortUrl = window.location.origin + '/' + data.shortCode;
                    const resultDiv = document.getElementById('result');
                    const shortUrlLink = document.getElementById('shortUrlLink');
                    
                    shortUrlLink.href = shortUrl;
                    shortUrlLink.innerText = shortUrl;
                    resultDiv.style.display = 'block';
                } else {
                    alert('Failed to shorten URL.');
                }
            } catch (err) {
                alert('Error connecting to the server.');
            } finally {
                button.disabled = false;
                button.innerText = 'Shorten URL';
            }
        });
    </script>
</body>
</html>
